<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{product/layout}">

<head>
    <meta charset="UTF-8">
    <title>Create Product</title>
</head>

<body>

<div layout:fragment="content" class="container body-content">

    <h2>Create Product</h2>

    <form th:action="@{/products/create}"
          th:object="${product}"
          method="post"
          enctype="multipart/form-data">

        <!-- Name -->
        <div class="form-group mb-3">
            <label>Name</label>
            <input type="text" th:field="*{name}" class="form-control">
            <div th:if="${#fields.hasErrors('name')}"
                 th:errors="*{name}"
                 class="text-danger"></div>
        </div>

        <!-- Price -->
        <div class="form-group mb-3">
            <label>Price</label>
            <input type="number" th:field="*{price}" class="form-control">
            <div th:if="${#fields.hasErrors('price')}"
                 th:errors="*{price}"
                 class="text-danger"></div>
        </div>

        <!-- Image -->
        <div class="form-group mb-3">
            <label>Image</label>
            <input type="file" name="imageProduct" class="form-control">
        </div>

        <!-- Category -->
        <div class="form-group mb-3">
            <label>Category</label>
            <select th:field="*{category.id}" class="form-control">
                <option value="">-- Select category --</option>
                <option th:each="category : ${categories}"
                        th:value="${category.id}"
                        th:text="${category.name}">
                </option>
            </select>
        </div>

        <!-- Buttons -->
        <button type="submit" class="btn btn-success">
            Add Product
        </button>

        <a th:href="@{/products}" class="btn btn-secondary">
            Back
        </a>

    </form>

</div>

</body>
</html>
